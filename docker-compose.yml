services:
  vertu-info-search:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${REPO:-docker.vertu.com}/${APP_NAME:-vertu-info-search}:${VERSION:-1.0.0}
    container_name: vertu-info-search
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/vertu/src
      - /vertu/src/.venv
    restart: unless-stopped
